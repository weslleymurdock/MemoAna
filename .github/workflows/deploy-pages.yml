name: Deploy Blazor WASM to GitHub Pages

on:
  push:
    branches: [ main ] 

  workflow_dispatch:

permissions:
  contents: write 

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout 
      uses: actions/checkout@v6

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x' 

    - name: Publicar o Projeto (dotnet publish)
      run: dotnet publish ./src/memoana.github.io/memoana.github.io.csproj -c Release -o release /p:BlazorEnableCompression=false

    - name: Setup base path
      run: |
        sed -i 's/<base href="\/" \/>/<base href="\/memoana\/" \/>/g' release/wwwroot/index.html
        
        touch release/wwwroot/.nojekyll
        
    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: release/wwwroot 
        branch: gh-pages 
        clean: true 