<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>MemoAna</title>
    <script type="text/javascript">
        var pathSegmentsToKeep = 1; // 1 if the app runs at subfolder (e.g.: weslleymurdock.github.io/memoana/)
        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
            l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            l.search.replace(/&/g, '~and~') + l.hash
        );
    </script>
</head>
<body>
</body>
</html>
